<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Insure Premium Estimator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='translator.js') }}"></script>
</head>
<body class="auth-wrapper">
    <div class="lang-selector-container floating-lang">
        <select class="lang-select" id="lang-select" onchange="window.changeLanguage(this.value)">
            <option value="en">🇺🇸 English</option>
            <option value="hi">🇮🇳 हिंदी</option>
            <option value="ur">🇵🇰 اردو</option>
        </select>
    </div>
    <div class="auth-card">
        <div class="auth-header">
            <!-- Insure Logo -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C7.5 4 5 7.5 5 11c0 5.5 4.5 9 7 11 2.5-2 7-5.5 7-11 0-3.5-2.5-7-7-9zm0 2.2c2.9 1.4 4.8 4 4.8 6.8 0 4.1-3.2 7-4.8 8.4-1.6-1.4-4.8-4.3-4.8-8.4 0-2.8 1.9-5.4 4.8-6.8zm-2.5 7.3l1.8 1.8 3.5-3.5 1 1-4.5 4.5-2.8-2.8 1-1z"/>
            </svg>
            <h1>Create Account</h1>
            <p>Get started with your custom premium forecaster</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('signup') }}" method="POST" class="auth-form" onsubmit="return validateForm()">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required autocomplete="new-password" minlength="6">
            </div>

            <button type="submit" class="btn btn-primary" style="height: 48px; border-radius: var(--radius-md); font-size: 15px; width: 100%;">
                Sign Up
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Log In</a>
        </div>
    </div>

    <script>
        function validateForm() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (username.indexOf(' ') >= 0) {
                alert('Spaces are not allowed in the username.');
                return false;
            }

            if (password.indexOf(' ') >= 0) {
                alert('Spaces are not allowed in the password.');
                return false;
            }

            if (password !== confirm) {
                alert('Passwords do not match.');
                return false;
            }

            return true;
        }
    </script>
</body>
</html>
