<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Insure Premium Estimator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='translator.js') }}"></script>
</head>
<body class="auth-wrapper">
    <div class="lang-selector-container floating-lang">
        <select class="lang-select" id="lang-select" onchange="window.changeLanguage(this.value)">
            <option value="en">🇺🇸 English</option>
            <option value="hi">🇮🇳 हिंदी</option>
            <option value="ur">🇵🇰 اردو</option>
        </select>
    </div>
    <div class="auth-card">
        <div class="auth-header">
            <!-- Insure Logo -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C7.5 4 5 7.5 5 11c0 5.5 4.5 9 7 11 2.5-2 7-5.5 7-11 0-3.5-2.5-7-7-9zm0 2.2c2.9 1.4 4.8 4 4.8 6.8 0 4.1-3.2 7-4.8 8.4-1.6-1.4-4.8-4.3-4.8-8.4 0-2.8 1.9-5.4 4.8-6.8zm-2.5 7.3l1.8 1.8 3.5-3.5 1 1-4.5 4.5-2.8-2.8 1-1z"/>
            </svg>
            <h1>Welcome Back</h1>
            <p>Access your predictive insurance dashboard</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label class="form-label" for="login_input">Username or Email</label>
                <input class="form-input" type="text" id="login_input" name="login_input" placeholder="Enter username or email" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-input-wrapper">
                    <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="password-toggle" id="pw-toggle" aria-label="Toggle password visibility">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
                            <path fill-rule="evenodd" d="M1.323 11.447C2.811 6.976 7.028 3.75 12.001 3.75c4.97 0 9.185 3.223 10.675 7.69.12.362.12.752 0 1.113-1.487 4.471-5.705 7.697-10.677 7.697-4.97 0-9.186-3.223-10.675-7.69a1.762 1.762 0 010-1.113zM17.25 12a5.25 5.25 0 11-10.5 0 5.25 5.25 0 0110.5 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="height: 48px; border-radius: var(--radius-md); font-size: 15px; width: 100%;">
                Log In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a>
        </div>
    </div>

    <script>
        const pwToggle = document.getElementById('pw-toggle');
        const pwInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');

        pwToggle.addEventListener('click', () => {
            if (pwInput.type === 'password') {
                pwInput.type = 'text';
                eyeIcon.innerHTML = `<path d="M3.53 2.47a.75.75 0 00-1.06 1.06l18 18a.75.75 0 101.06-1.06l-18-18zM22.676 12.553a11.249 11.249 0 01-2.631 4.31l-3.099-3.099a5.25 5.25 0 00-6.71-6.71L7.759 4.577a11.217 11.217 0 014.242-.827c4.97 0 9.185 3.223 10.675 7.69.12.362.12.752 0 1.113z" /><path d="M12.427 17.518a11.168 11.168 0 01-6.426-3.53L4.17 15.82a11.238 11.238 0 01-2.847-4.38 1.758 1.758 0 010-1.113c1.002-3.018 3.268-5.467 6.136-6.666L5.3 1.5a.75.75 0 011.06-1.06l16.037 16.037a.75.75 0 01-1.06 1.06l-1.874-1.874c-1.89 1.258-4.14 1.837-6.036 1.837zm-.426-10.268a3 3 0 00-3.328 3.328L12 13.906V7.25z" />`;
            } else {
                pwInput.type = 'password';
                eyeIcon.innerHTML = `<path d="M12 15a3 3 0 100-6 3 3 0 000 6z" /><path fill-rule="evenodd" d="M1.323 11.447C2.811 6.976 7.028 3.75 12.001 3.75c4.97 0 9.185 3.223 10.675 7.69.12.362.12.752 0 1.113-1.487 4.471-5.705 7.697-10.677 7.697-4.97 0-9.186-3.223-10.675-7.69a1.762 1.762 0 010-1.113zM17.25 12a5.25 5.25 0 11-10.5 0 5.25 5.25 0 0110.5 0z" clip-rule="evenodd" />`;
            }
        });
    </script>
</body>
</html>
